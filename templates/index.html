    const btn = document.getElementById('music-btn');

        icon.className = "fas fa-pause"; // 切换为暂停图标

        audio.pause();

    function sendMsg() {
    const name = document.getElementById('m-name').value;
    const content = document.getElementById('m-content').value;
    const btn = document.querySelector('.send-btn');

    if (!name || !content) {
        alert("请输入名字和内容哦！");
        return;
    }

    // 1. 按钮状态反馈
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
    btn.disabled = true;

    fetch('/api/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, content })
    })
    .then(res => {
        if (res.ok) {
            // 2. 清空输入并刷新列表
            document.getElementById('m-content').value = "";
            btn.innerHTML = '<i class="fas fa-check"></i> 发送成功';
            setTimeout(() => {
                btn.innerHTML = '发送到 MongoDB';
                btn.disabled = false;
            }, 2000);
            loadMsgs();
        }
    })
    .catch(err => {
        btn.innerHTML = '发送失败，请重试';
        btn.disabled = false;
    });
}

    function loadMsgs() {

}

    // 5. 粒子背景逻辑 (保持不变)
    const canvas = document.getElementById('tech-canvas'), ctx = canvas.getContext('2d');
    let particles = [];
    function init() { 
        canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
        particles = Array.from({length: 60}, () => ({ 
            x: Math.random()*canvas.width, y: Math.random()*canvas.height, 
            sx: (Math.random()-0.5)*0.5, sy: (Math.random()-0.5)*0.5, r: Math.random()*1.5 
        })); 
    }
    function animate() { 
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(0,210,255,0.3)"; 
        particles.forEach(p => { 
            p.x+=p.sx; p.y+=p.sy; if(p.x<0||p.x>canvas.width) p.sx*=-1; if(p.y<0||p.y>canvas.height) p.sy*=-1; 
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); 
        }); requestAnimationFrame(animate); 
    }
    window.onresize = init; init(); animate();
